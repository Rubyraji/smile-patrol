name: Build Android App Bundle

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app for mobile
        run: pnpm --filter @workspace/habits run build:mobile

      - name: Add Android platform
        working-directory: artifacts/habits
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: artifacts/habits
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: artifacts/habits/android
        run: chmod +x gradlew

      - name: Build release AAB (signed)
        if: ${{ secrets.KEYSTORE_FILE != '' }}
        working-directory: artifacts/habits/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > keystore.jks
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/keystore.jks \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Build debug AAB (no keystore)
        if: ${{ secrets.KEYSTORE_FILE == '' }}
        working-directory: artifacts/habits/android
        run: ./gradlew bundleDebug

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: smile-patrol-aab
          path: |
            artifacts/habits/android/app/build/outputs/bundle/release/app-release.aab
            artifacts/habits/android/app/build/outputs/bundle/debug/app-debug.aab
          if-no-files-found: warn
          retention-days: 30
