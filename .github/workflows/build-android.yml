name: Build Android App Bundle

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      KEY_STORE_PASSWORD: SmilePatrol2024!
      KEY_ALIAS: smilepatrol
      KEY_PASSWORD: SmilePatrol2024!

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app for mobile
        run: pnpm --filter @workspace/habits run build:mobile

      - name: Add Android platform
        working-directory: artifacts/habits
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: artifacts/habits
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: artifacts/habits/android
        run: chmod +x gradlew

      - name: Generate release keystore
        working-directory: artifacts/habits/android
        run: |
          keytool -genkeypair \
            -alias $KEY_ALIAS \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore smilepatrol-release.jks \
            -dname "CN=Smile Patrol, OU=App, O=Rubyraji, L=Unknown, ST=Unknown, C=US" \
            -storepass $KEY_STORE_PASSWORD \
            -keypass $KEY_PASSWORD \
            -noprompt

      - name: Build release AAB
        working-directory: artifacts/habits/android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/smilepatrol-release.jks \
            -Pandroid.injected.signing.store.password="$KEY_STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Upload signed release AAB
        uses: actions/upload-artifact@v4
        with:
          name: smile-patrol-release-aab
          path: artifacts/habits/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30

      - name: Upload keystore (SAVE THIS FILE)
        uses: actions/upload-artifact@v4
        with:
          name: smilepatrol-keystore-SAVE-THIS
          path: artifacts/habits/android/smilepatrol-release.jks
          if-no-files-found: warn
          retention-days: 30
