name: Build Android App Bundle

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app for mobile
        run: pnpm --filter @workspace/habits run build:mobile

      - name: Install Capacitor CLI
        run: pnpm add -g @capacitor/cli

      - name: Add Android platform (if not present)
        working-directory: artifacts/habits
        run: |
          if [ ! -d "android" ]; then
            cap add android
          fi

      - name: Sync Capacitor
        working-directory: artifacts/habits
        run: cap sync android

      - name: Make gradlew executable
        working-directory: artifacts/habits/android
        run: chmod +x gradlew

      - name: Build release AAB
        working-directory: artifacts/habits/android
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_FILE" ]; then
            echo "$KEYSTORE_FILE" | base64 --decode > keystore.jks
            ./gradlew bundleRelease \
              -Pandroid.injected.signing.store.file=$(pwd)/keystore.jks \
              -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          else
            ./gradlew bundleDebug
          fi

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: smile-patrol-aab
          path: |
            artifacts/habits/android/app/build/outputs/bundle/release/app-release.aab
            artifacts/habits/android/app/build/outputs/bundle/debug/app-debug.aab
          if-no-files-found: warn
          retention-days: 30
