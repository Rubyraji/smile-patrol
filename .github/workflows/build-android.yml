name: Build Android App Bundle

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app for mobile
        run: pnpm --filter @workspace/habits run build:mobile

      - name: Add Android platform
        working-directory: artifacts/habits
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: artifacts/habits
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: artifacts/habits/android
        run: chmod +x gradlew

      - name: Build debug AAB
        working-directory: artifacts/habits/android
        run: ./gradlew bundleDebug

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: smile-patrol-aab
          path: artifacts/habits/android/app/build/outputs/bundle/debug/app-debug.aab
          if-no-files-found: error
          retention-days: 30
